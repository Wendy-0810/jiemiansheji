<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wendy - Games</title>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=VT323&display=swap" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,400&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'VT323', monospace;
            background-color: #E6EDF5;
            color: #000000;
            overflow-x: hidden;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }

        @keyframes scanLine {
            0% { top: -100%; }
            100% { top: 100%; }
        }

        @keyframes pulseBorder {
            0%, 100% { border-color: rgba(0,0,0,0.3); }
            50% { border-color: rgba(0,0,0,0.8); }
        }

        @keyframes floatAnim {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .hero {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .scan-line {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: rgba(0,0,0,0.1);
            animation: scanLine 8s linear infinite;
            z-index: 999;
            pointer-events: none;
        }

        .logo {
            position: absolute;
            top: 3%;
            left: 3%;
            width: 8vw;
            max-width: 150px;
            height: auto;
            z-index: 10;
            animation: fadeInUp 0.8s cubic-bezier(0.18, 0.89, 0.32, 1.28) 0.2s both;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        .logo:hover {
            transform: scale(1.1);
            opacity: 0.8;
        }

        .logo svg {
            width: 100%;
            height: 100%;
        }

        .nav {
            position: absolute;
            top: 3%;
            right: 3%;
            display: flex;
            align-items: center;
            gap: 5vw;
            z-index: 10;
            animation: fadeInUp 0.8s cubic-bezier(0.18, 0.89, 0.32, 1.28) 0.3s both;
        }

        .lang-switch {
            font-family: 'DotGothic16', sans-serif;
            font-size: 0.7vw;
            padding: 5px 12px;
            border: 1px solid #000000;
            background: transparent;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }

        .lang-switch:hover {
            background: #000000;
            color: #FFFFFF;
            transform: translateY(-2px);
        }

        .nav-links {
            font-family: 'VT323', monospace;
            font-size: 1.8vw;
            color: #000000;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            position: relative;
        }

        .nav-links:hover {
            opacity: 0.6;
            transform: translateY(-2px);
        }

        .nav-links::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 1px;
            background: #000000;
            transition: width 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }

        .nav-links:hover::after {
            width: 100%;
        }

        .section-title {
            position: absolute;
            top: 18%;
            left: 5%;
            z-index: 10;
            animation: fadeInUp 0.8s cubic-bezier(0.18, 0.89, 0.32, 1.28) 0.4s both;
        }

        .section-title h2 {
            font-family: 'VT323', monospace;
            font-size: 2.2vw;
            font-weight: 400;
            line-height: 1.2em;
            color: #000000;
            text-decoration: underline;
        }

        .tech-line-wrapper {
            position: relative;
            margin-top: 8px;
            width: 20vw;
            display: flex;
            align-items: center;
        }

        .tech-square-start {
            width: 8px;
            height: 8px;
            background: #000000;
            position: relative;
            z-index: 3;
            animation: glitch 2s ease-in-out infinite;
        }

        .tech-line-path {
            position: relative;
            flex: 1;
            height: 1px;
            margin-left: 4px;
            background: repeating-linear-gradient(90deg, #000000 0px, #000000 3px, transparent 3px, transparent 6px);
        }

        .games-grid {
            position: relative;
            width: 95%;
            max-width: 1400px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 100px;
            z-index: 50;
            animation: fadeInUp 1s cubic-bezier(0.18, 0.89, 0.32, 1.28) 0.6s both;
            margin-top: 50px;
        }

        .game-card {
            background: #FFFFFF;
            border: 2px solid #000000;
            padding: 8px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            position: relative;
            animation: pulseBorder 3s ease-in-out infinite;
            aspect-ratio: 16/9;
            width: 100%;
            height: auto;
        }

        .game-card:nth-child(1) { transform: rotate(-2deg); }
        .game-card:nth-child(2) { transform: rotate(2deg); }
        .game-card:nth-child(3) { transform: rotate(1deg); }
        .game-card:nth-child(4) { transform: rotate(-1deg); }

        .game-card:hover {
            transform: scale(1.02) rotate(0deg) !important;
            box-shadow: 12px 12px 0 rgba(0, 0, 0, 0.15);
            animation: none;
        }

        .game-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .game-card::before {
            content: '';
            position: absolute;
            top: -4px;
            left: -4px;
            right: -4px;
            bottom: -4px;
            border: 1px dashed rgba(0,0,0,0.15);
            pointer-events: none;
        }

        .game-label {
            position: absolute;
            top: 15px;
            left: -12px;
            background: #000000;
            color: #FFFFFF;
            padding: 5px 12px;
            font-family: 'VT323', monospace;
            font-size: 0.9vw;
            z-index: 5;
            animation: floatAnim 3s ease-in-out infinite;
        }

        .game-features {
            position: absolute;
            bottom: 8px;
            left: 8px;
            right: 8px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid #000000;
        }

        .game-features h3 {
            font-family: 'VT323', monospace;
            font-size: 1.1vw;
            margin-bottom: 8px;
        }

        .game-features ul {
            list-style: none;
            padding-left: 0;
            margin: 0;
        }

        .game-features li {
            font-size: 0.9vw;
            margin-bottom: 3px;
            padding-left: 12px;
            position: relative;
        }

        .game-features li::before {
            content: '>';
            position: absolute;
            left: 0;
        }

        .annotation {
            position: absolute;
            font-family: 'VT323', monospace;
            font-size: 1vw;
            line-height: 1.3em;
            color: #000000;
            background: rgba(230, 237, 245, 0.95);
            padding: 8px 12px;
            border: 1px solid #000000;
            z-index: 7;
            opacity: 0;
            animation: fadeInUp 0.6s cubic-bezier(0.18, 0.89, 0.32, 1.28) 2s both;
            backdrop-filter: blur(4px);
        }

        .annotation::before {
            content: '> ';
            float: left;
            margin-right: 4px;
        }

        .annotation::after {
            content: '';
            position: absolute;
            bottom: 5px;
            right: -15px;
            border: 8px solid transparent;
            border-left-color: #000000;
        }

        .annotation-top {
            top: 20%;
            left: 55%;
            width: 200px;
        }

        .annotation-bottom {
            bottom: 10%;
            left: 30%;
            width: 220px;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-window {
            background: #FFFFFF;
            border: 2px solid #000000;
            border-radius: 8px;
            box-shadow: 20px 20px 0 rgba(0, 0, 0, 0.2);
            width: 96%;
            max-width: 1300px;
            aspect-ratio: 32/19;
            overflow: hidden;
            transform: scale(0.9) translateY(20px);
            transition: all 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }

        .modal-overlay.active .modal-window {
            transform: scale(1) translateY(0);
        }

        .window-titlebar {
            background: #f0f0f0;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #ddd;
            cursor: move;
        }

        .window-title {
            flex: 1;
            text-align: center;
            font-family: 'VT323', monospace;
            font-size: 1.5vw;
            color: #333;
        }

        .window-close-btn {
            background: none;
            border: none;
            font-size: 20px;
            color: #666;
            cursor: pointer;
            padding: 0 5px;
            transition: all 0.2s;
        }

        .window-close-btn:hover {
            color: #ff5f56;
            transform: scale(1.2);
        }

        .window-content {
            padding: 0;
            background: #fff;
            max-height: calc(85vh - 46px);
            overflow-y: auto;
        }

        .window-content img {
            width: 100%;
            height: auto;
            display: block;
        }

        @media (max-width: 1024px) {
            .logo { width: 30%; }
            .nav { gap: 20px; }
            .nav-links { font-size: 14px; }
            .lang-switch { font-size: 10px; }
            .section-title { top: 22%; left: 4%; }
            .section-title h2 { font-size: 18px; }
            .games-grid { grid-template-columns: 1fr; gap: 20px; }
            .annotation { font-size: 12px; position: static !important; transform: none !important; width: auto !important; margin: 10px 0; }
            .annotation::before { content: '> '; float: none; margin-right: 4px; }
            .annotation::after { display: none; }
        }

        @media (max-width: 768px) {
            .logo { top: 1%; width: 40%; }
            .nav { top: 2%; right: 2%; gap: 15px; }
            .nav-links { font-size: 14px; }
            .lang-switch { font-size: 10px; }
            .section-title { top: 22%; left: 4%; }
            .section-title h2 { font-size: 20px; }
            .tech-line-wrapper { width: 40%; }
            .modal-window { width: 98%; }
            .game-label { font-size: 12px; }
            .game-features h3 { font-size: 14px; }
            .game-features li { font-size: 12px; }
        }
    </style>
</head>
<body>
    <div class="scan-line"></div>
    
    <div class="hero">
        <div class="logo" onclick="goToIndex()" style="cursor: pointer;">
            <img src="./assets/logo-wendy.svg" alt="Wendy" />
        </div>

        <nav class="nav">
            <button class="lang-switch">EN/中文</button>
            <a href="works.html" class="nav-links">Works</a>
            <a href="#about" class="nav-links">About</a>
            <a href="#contact" class="nav-links">Contact</a>
        </nav>

        <div class="section-title">
            <h2>3.Games</h2>
            <div class="tech-line-wrapper">
                <div class="tech-square-start"></div>
                <div class="tech-line-path"></div>
            </div>
        </div>

        <div class="games-grid">
            <div class="game-card" onclick="openModal('Game 1', './assets/work-card-2-2cc0ae.png')">
                <div class="game-label">Game 1</div>
                <img src="./assets/work-card-2-2cc0ae.png" alt="Game 1" />
                <div class="game-features">
                    <h3>游戏签到界面</h3>
                    <ul>
                    </ul>
                </div>
            </div>

            <div class="game-card" onclick="openModal('Game 2', './assets/work-card-3-60e672.png')">
                <div class="game-label">Game 2</div>
                <img src="./assets/work-card-3-60e672.png" alt="Game 2" />
                <div class="game-features">
                    <h3>抽卡游戏设计</h3>
                    <ul>
                        <li>魔女冒险魔法世界观</li>
                        <li>颜色以紫色金色为主</li>
                        <li>西方玄幻魔法风格</li>
                    </ul>
                </div>
            </div>
        </div>

        <div class="annotation annotation-top">游戏相关界面设计</div>
        <div class="annotation annotation-bottom">参考一些游戏界面加AI辅助</div>
    </div>

    <div class="modal-overlay" id="gameModal">
        <div class="modal-window">
            <div class="window-titlebar">
                <div style="width: 60px;"></div>
                <div class="window-title" id="modalTitle">Game Details</div>
                <button class="window-close-btn" onclick="closeModal()">×</button>
            </div>
            <div class="window-content">
                <img id="modalImage" src="./assets/gameshow.png" alt="Game Detail" />
            </div>
        </div>
    </div>

    <script>
        function openModal(title, imageSrc) {
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalImage').src = imageSrc;
            document.getElementById('gameModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('gameModal').classList.remove('active');
        }

        document.getElementById('gameModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModal();
            }
        });

        // 点击 Wendy logo 返回首页
        function goToIndex() {
            document.body.style.transition = 'opacity 0.5s ease';
            document.body.style.opacity = '0';
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 500);
        }
    </script>
</body>
</html>

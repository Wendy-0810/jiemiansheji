<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wendy - Personal Homepage</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=DotGothic16&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background-color: #A3CFEB;
            color: #FFFFFF;
            overflow-x: hidden;
            overflow-y: auto;
        }

        /* Hero Section */
        .hero {
            position: relative;
            width: 100vw;
            height: 100vh;
            background-color: #A3CFEB;
            background-image: url('./assets/bg-tree.png');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .main-title {
            position: absolute;
            top: 27%;
            left: 10%;
            width: 74%;
            height: auto;
            z-index: 10;
        }

        .logo {
            position: absolute;
            top: 2%;
            left: 1.5%;
            font-family: '42dot Sans', 'Segoe UI', sans-serif;
            font-size: 2vw;
            font-weight: 400;
            line-height: 0.9em;
            letter-spacing: 0.01em;
            color: #FFFFFF;
            z-index: 10;
        }

        .projects-link {
            position: absolute;
            top: 2.5%;
            left: 63.8%;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            font-size: 2vw;
            font-weight: 400;
            line-height: 0.9em;
            letter-spacing: 0.01em;
            color: #FFFFFF;
            text-decoration: none;
            z-index: 10;
            transition: opacity 0.3s ease;
        }

        .projects-link:hover {
            opacity: 0.8;
        }

        .decoration {
            position: absolute;
            z-index: 10;
        }

        .deco-1 {
            top: 20%;
            left: 76.8%;
            width: 8.23vw;
            height: auto;
        }

        .deco-2 {
            top: 75%;
            left: 25.4%;
            width: 7.79vw;
            height: auto;
        }

        .deco-3 {
            top: 71%;
            left: 82.5%;
            width: 3.99vw;
            height: auto;
        }

        .contact-info {
            position: absolute;
            top: 91.8%;
            left: 3.3%;
            z-index: 10;
        }

        .contact-info .find-me {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            font-size: 1.25vw;
            font-weight: 400;
            line-height: 0.9em;
            letter-spacing: 0.01em;
            color: #FFFFFF;
            opacity: 0.36;
            margin-bottom: 1.5%;
            display: block;
        }

        .contact-info .email {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            font-size: 1.25vw;
            font-weight: 400;
            line-height: 0.9em;
            letter-spacing: 0.01em;
            color: #FFFFFF;
            text-decoration: none;
            transition: opacity 0.3s ease;
        }

        .contact-info .email:hover {
            opacity: 0.8;
        }

        .separator {
            position: absolute;
            top: 93.5%;
            left: 51.3%;
            width: 1px;
            height: 2.42vw;
            background: #FFFFFF;
            z-index: 10;
        }

        /* Scroll Indicator */
        .scroll-indicator {
            position: absolute;
            bottom: 5%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            animation: bounce 2s infinite;
        }

        .scroll-indicator span {
            font-family: 'VT323', monospace;
            font-size: 1.5vw;
            color: #FFFFFF;
            opacity: 0.7;
        }

        .scroll-arrow {
            width: 30px;
            height: 30px;
            margin-top: 10px;
            opacity: 0.7;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {
                transform: translateX(-50%) translateY(0);
            }
            40% {
                transform: translateX(-50%) translateY(-10px);
            }
            60% {
                transform: translateX(-50%) translateY(-5px);
            }
        }

        /* Transition Section */
        .transition-section {
            position: relative;
            width: 100vw;
            height: 200vh;
            background: linear-gradient(to bottom, #A3CFEB 0%, #E6EDF5 50%, #E6EDF5 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .works-preview {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80vw;
            height: 80vh;
            z-index: 100;
            opacity: 0;
            transition: opacity 0.5s ease;
            pointer-events: none;
        }

        .works-preview.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* Works Cards Container */
        .works-cards-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 50;
            opacity: 0;
            background: #E6EDF5;
        }

        .works-preview-card {
            position: absolute;
            background: #FFFFFF;
            border: 1px solid #000000;
            padding: 8px;
            overflow: hidden;
            cursor: pointer;
            opacity: 0;
            transition: transform 0.3s ease-out, opacity 0.3s ease-out;
        }

        .works-preview-card img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* 卡片位置和大小 - 和 works.html 一致，保持原有角度 */
        .preview-card-1 {
            top: 18%;
            left: 35%;
            width: 24%;
            transform: rotate(-3deg) scale(1.5);
            z-index: 1;
        }

        .preview-card-2 {
            top: 14%;
            right: 3%;
            width: 35%;
            transform: rotate(3deg) scale(1.5);
            z-index: 2;
        }

        .preview-card-3 {
            top: 45%;
            left: 8%;
            width: 28%;
            transform: rotate(-5deg) scale(1.5);
            z-index: 4;
        }

        .preview-card-4 {
            top: 42%;
            left: 58%;
            width: 10%;
            transform: rotate(4deg) scale(1.5);
            z-index: 5;
        }

        .preview-card-5 {
            top: 50%;
            left: 45%;
            width: 20%;
            transform: rotate(-4deg) scale(1.5);
            z-index: 3;
        }

        .preview-card-6 {
            top: 60%;
            left: 58%;
            width: 24%;
            transform: rotate(-3deg) scale(1.5);
            z-index: 7;
        }

        .preview-card-7 {
            top: 80%;
            left: 22%;
            width: 38%;
            transform: rotate(0deg) scale(1.5);
            z-index: 8;
        }

        .preview-card-8 {
            top: 55%;
            left: 82%;
            width: 14%;
            transform: rotate(10deg) scale(1.5);
            z-index: 6;
        }

        /* Scanlines Effect */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.03),
                rgba(0, 0, 0, 0.03) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .scanlines.active {
            opacity: 1;
        }

        @media (max-width: 768px) {
            .logo {
                font-size: 18px;
            }

            .projects-link {
                font-size: 18px;
                left: 55%;
            }

            .contact-info .find-me,
            .contact-info .email {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <!-- Scanlines Overlay -->
    <div class="scanlines"></div>

    <!-- Hero Section -->
    <div class="hero">
        <div class="logo">WENDY_24280309</div>
        <a href="#transition" class="projects-link">Projects</a>
        
        <div class="main-title">
            <img src="./assets/title-wendy.svg" alt="Wendy" />
        </div>
        
        <div class="decoration deco-1">
            <img src="./assets/deco-1.svg" alt="Decoration" />
        </div>
        
        <div class="decoration deco-2">
            <img src="./assets/deco-2.svg" alt="Decoration" />
        </div>
        
        <div class="decoration deco-3">
            <img src="./assets/deco-3.svg" alt="Decoration" />
        </div>
        
        <div class="contact-info">
            <span class="find-me">Find me</span>
            <a href="mailto:3124655698@qq.com" class="email">3124655698(at)qq(dot)com</a>
        </div>
        
        <div class="separator"></div>

        <!-- Scroll Indicator -->
        <div class="scroll-indicator">
            <span>Scroll to explore</span>
            <svg class="scroll-arrow" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                <path d="M12 5v14M5 12l7 7 7-7"/>
            </svg>
        </div>
    </div>

    <!-- Transition Section -->
    <div class="transition-section" id="transition">
        <div class="works-cards-container" id="worksCardsContainer">
            <div class="works-preview-card preview-card-1">
                <img src="./assets/work-card-1.png" alt="作品1" />
            </div>
            <div class="works-preview-card preview-card-2">
                <img src="./assets/work-card-2-2cc0ae.png" alt="作品2" />
            </div>
            <div class="works-preview-card preview-card-3">
                <img src="./assets/work-card-5.png" alt="作品3" />
            </div>
            <div class="works-preview-card preview-card-4">
                <img src="./assets/work-card-4.png" alt="作品4" />
            </div>
            <div class="works-preview-card preview-card-5">
                <img src="./assets/work-card-3-60e672.png" alt="作品5" />
            </div>
            <div class="works-preview-card preview-card-6">
                <img src="./assets/work-card-6.png" alt="作品6" />
            </div>
            <div class="works-preview-card preview-card-7">
                <img src="./assets/work-card-7.png" alt="作品7" />
            </div>
            <div class="works-preview-card preview-card-8">
                <img src="./assets/work-card-8.png" alt="作品8" />
            </div>
        </div>
    </div>

    <script>
        const worksCardsContainer = document.getElementById('worksCardsContainer');
        const previewCards = document.querySelectorAll('.works-preview-card');
        const scanlines = document.querySelector('.scanlines');
        const heroSection = document.querySelector('.hero');

        let hasNavigated = false;

        // 页面加载时显示卡片（放大状态，保持原有角度）
        window.addEventListener('load', () => {
            setTimeout(() => {
                worksCardsContainer.style.opacity = 1;
                previewCards.forEach(card => {
                    card.style.opacity = 1;
                });
            }, 500);
        });

        // Scroll animation
        window.addEventListener('scroll', () => {
            const scrollTop = window.scrollY;
            const windowHeight = window.innerHeight;
            const transitionStart = windowHeight * 0.3; // 滚动30%开始
            const transitionEnd = windowHeight * 1.3;   // 总共1个屏幕高度过渡
            const transitionRange = transitionEnd - transitionStart;

            // Calculate progress through transition section
            if (scrollTop >= transitionStart && scrollTop < transitionEnd) {
                const progress = (scrollTop - transitionStart) / transitionRange;

                // Hero 区域淡出
                heroSection.style.opacity = Math.max(0, 1 - progress);

                // 每个卡片从 scale(1.5) 缩小到 scale(1)，保持原有角度
                previewCards.forEach((card, index) => {
                    // 缓动函数让动画更自然
                    const easedProgress = 1 - Math.pow(1 - progress, 3);
                    
                    // 轻微延迟，让卡片依次缩小
                    const delay = index * 0.03;
                    const adjustedProgress = Math.max(0, Math.min(1, (easedProgress - delay) / (1 - delay)));
                    
                    // 缩放从 1.5 到 1
                    const scale = 1.5 - (adjustedProgress * 0.5);

                    // 获取卡片原有的 rotate 值并保留
                    const cardClass = card.className.split(' ').find(c => c.startsWith('preview-card-'));
                    let rotate = 0;
                    if (cardClass === 'preview-card-1') rotate = 3;
                    else if (cardClass === 'preview-card-2') rotate = -4;
                    else if (cardClass === 'preview-card-3') rotate = -2;
                    else if (cardClass === 'preview-card-4') rotate = 3;
                    else if (cardClass === 'preview-card-5') rotate = 2;
                    else if (cardClass === 'preview-card-6') rotate = -5;
                    else if (cardClass === 'preview-card-7') rotate = 1;
                    else if (cardClass === 'preview-card-8') rotate = -3;

                    card.style.transform = `rotate(${rotate}deg) scale(${scale})`;
                });

                worksCardsContainer.style.opacity = 1;
                scanlines.classList.add('active');
            }

            // Before transition section - 保持放大状态
            else if (scrollTop < transitionStart) {
                heroSection.style.opacity = 1;
                
                previewCards.forEach((card) => {
                    // 获取卡片原有的 rotate 值并保留，缩放回到 1.5
                    const cardClass = card.className.split(' ').find(c => c.startsWith('preview-card-'));
                    let rotate = 0;
                    if (cardClass === 'preview-card-1') rotate = 3;
                    else if (cardClass === 'preview-card-2') rotate = -4;
                    else if (cardClass === 'preview-card-3') rotate = -2;
                    else if (cardClass === 'preview-card-4') rotate = 3;
                    else if (cardClass === 'preview-card-5') rotate = 2;
                    else if (cardClass === 'preview-card-6') rotate = -5;
                    else if (cardClass === 'preview-card-7') rotate = 1;
                    else if (cardClass === 'preview-card-8') rotate = -3;

                    card.style.transform = `rotate(${rotate}deg) scale(1.5)`;
                });

                worksCardsContainer.style.opacity = 1;
                scanlines.classList.remove('active');
                hasNavigated = false;
            }

            // 过渡完成，跳转到 works.html（无闪烁）
            if (scrollTop >= transitionEnd && !hasNavigated) {
                hasNavigated = true;
                // 直接跳转，works.html 会处理淡入
                window.location.href = 'works.html?from=index';
            }
        });

        // Smooth scroll for projects link
        document.querySelector('.projects-link').addEventListener('click', (e) => {
            e.preventDefault();
            const target = document.querySelector('#transition');
            target.scrollIntoView({ behavior: 'smooth' });
        });

        // Initial state
        worksCardsContainer.style.opacity = 0;
        previewCards.forEach(card => {
            card.style.opacity = 0;
        });
    </script>
</body>
</html>

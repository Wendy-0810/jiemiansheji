<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wendy - Icons</title>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=VT323&display=swap" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,400&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'VT323', monospace;
            background-color: #E6EDF5;
            color: #000000;
            overflow-x: hidden;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }

        @keyframes scanLine {
            0% { top: -100%; }
            100% { top: 100%; }
        }

        @keyframes pulseBorder {
            0%, 100% { border-color: rgba(0,0,0,0.3); }
            50% { border-color: rgba(0,0,0,0.8); }
        }

        @keyframes floatAnim {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .hero {
            position: relative;
            width: 100vw;
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 50px 0;
        }

        .scan-line {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: rgba(0,0,0,0.1);
            animation: scanLine 8s linear infinite;
            z-index: 999;
            pointer-events: none;
        }

        .logo {
            position: absolute;
            top: 3%;
            left: 3%;
            width: 8vw;
            max-width: 150px;
            height: auto;
            z-index: 10;
            animation: fadeInUp 0.8s cubic-bezier(0.18, 0.89, 0.32, 1.28) 0.2s both;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        .logo:hover {
            transform: scale(1.1);
            opacity: 0.8;
        }

        .logo svg {
            width: 100%;
            height: 100%;
        }

        .nav {
            position: absolute;
            top: 3%;
            right: 3%;
            display: flex;
            align-items: center;
            gap: 5vw;
            z-index: 10;
            animation: fadeInUp 0.8s cubic-bezier(0.18, 0.89, 0.32, 1.28) 0.3s both;
        }

        .lang-switch {
            font-family: 'DotGothic16', sans-serif;
            font-size: 0.7vw;
            padding: 5px 12px;
            border: 1px solid #000000;
            background: transparent;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }

        .lang-switch:hover {
            background: #000000;
            color: #FFFFFF;
            transform: translateY(-2px);
        }

        .nav-links {
            font-family: 'VT323', monospace;
            font-size: 1.8vw;
            color: #000000;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            position: relative;
        }

        .nav-links:hover {
            opacity: 0.6;
            transform: translateY(-2px);
        }

        .nav-links::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 1px;
            background: #000000;
            transition: width 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }

        .nav-links:hover::after {
            width: 100%;
        }

        .section-title {
            position: absolute;
            top: 18%;
            left: 5%;
            z-index: 10;
            animation: fadeInUp 0.8s cubic-bezier(0.18, 0.89, 0.32, 1.28) 0.4s both;
        }

        .section-title h2 {
            font-family: 'VT323', monospace;
            font-size: 2.2vw;
            font-weight: 400;
            line-height: 1.2em;
            color: #000000;
            text-decoration: underline;
        }

        .tech-line-wrapper {
            position: relative;
            margin-top: 8px;
            width: 20vw;
            display: flex;
            align-items: center;
        }

        .tech-square-start {
            width: 8px;
            height: 8px;
            background: #000000;
            position: relative;
            z-index: 3;
            animation: glitch 2s ease-in-out infinite;
        }

        .tech-line-path {
            position: relative;
            flex: 1;
            height: 1px;
            margin-left: 4px;
            background: repeating-linear-gradient(90deg, #000000 0px, #000000 3px, transparent 3px, transparent 6px);
        }

        .icons-showcase {
            position: relative;
            width: 90%;
            max-width: 1200px;
            z-index: 50;
            animation: fadeInUp 1s cubic-bezier(0.18, 0.89, 0.32, 1.28) 0.6s both;
            margin-top: 80px;
        }

        .icons-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .icon-card {
            background: #FFFFFF;
            border: 2px solid #000000;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            position: relative;
            min-height: 180px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .icon-card:nth-child(1) { transform: rotate(-2deg); }
        .icon-card:nth-child(2) { transform: rotate(1deg); }
        .icon-card:nth-child(3) { transform: rotate(-1deg); }
        .icon-card:nth-child(4) { transform: rotate(2deg); }
        .icon-card:nth-child(5) { transform: rotate(-0.5deg); }

        .icon-card:hover {
            transform: rotate(0deg);
        }

        .icon-emoji {
            width: 100%;
            max-width: 120px;
            height: auto;
            margin-bottom: 15px;
            animation: floatAnim 3s ease-in-out infinite;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        .icon-name {
            font-family: 'VT323', monospace;
            font-size: 1.2vw;
            margin-bottom: 8px;
        }

        .icon-desc {
            font-size: 0.9vw;
            color: #666;
        }

        .icons-banner {
            background: #000000;
            color: #FFFFFF;
            padding: 30px;
            border: 2px solid #000000;
            transform: rotate(0.5deg);
        }

        .icons-banner h3 {
            font-family: 'VT323', monospace;
            font-size: 1.8vw;
            margin-bottom: 15px;
        }

        .icons-banner p {
            font-size: 1.1vw;
            line-height: 1.6;
        }

        .icon-tag {
            display: inline-block;
            background: #FFFFFF;
            color: #000000;
            padding: 5px 15px;
            margin: 5px;
            font-family: 'VT323', monospace;
            font-size: 1vw;
            border: 1px solid #000000;
            transition: all 0.3s;
        }

        .icon-tag:hover {
            background: #000000;
            color: #FFFFFF;
        }

        .annotation {
            position: absolute;
            font-family: 'VT323', monospace;
            font-size: 1vw;
            line-height: 1.3em;
            color: #000000;
            background: rgba(230, 237, 245, 0.95);
            padding: 8px 12px;
            border: 1px solid #000000;
            z-index: 7;
            opacity: 0;
            animation: fadeInUp 0.6s cubic-bezier(0.18, 0.89, 0.32, 1.28) 2s both;
            backdrop-filter: blur(4px);
        }

        .annotation::before {
            content: '> ';
            float: left;
            margin-right: 4px;
        }

        .annotation::after {
            content: '';
            position: absolute;
            bottom: 5px;
            right: -15px;
            border: 8px solid transparent;
            border-left-color: #000000;
        }

        .annotation-top {
            top: 20%;
            right: 5%;
            left: auto;
            width: 200px;
        }

        .annotation-bottom {
            bottom: 10%;
            left: 5%;
            width: 230px;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-window {
            background: #FFFFFF;
            border: 2px solid #000000;
            border-radius: 8px;
            box-shadow: 20px 20px 0 rgba(0, 0, 0, 0.2);
            width: 96%;
            max-width: 900px;
            aspect-ratio: 16/10;
            overflow: hidden;
        }

        .window-titlebar {
            background: #f0f0f0;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #ddd;
        }

        .window-title {
            flex: 1;
            text-align: center;
            font-family: 'VT323', monospace;
            font-size: 1.5vw;
            color: #333;
        }

        .window-close-btn {
            background: none;
            border: none;
            font-size: 20px;
            color: #666;
            cursor: pointer;
            padding: 0 5px;
            transition: all 0.2s;
        }

        .window-close-btn:hover {
            color: #ff5f56;
            transform: scale(1.2);
        }

        .window-content {
            padding: 0;
            background: #fff;
            max-height: calc(85vh - 46px);
            overflow-y: auto;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 30px;
            padding: 30px;
        }

        .window-content img {
            max-width: 45%;
            height: auto;
            display: block;
            border: 2px solid #000000;
            padding: 10px;
            background: #fff;
        }

        @media (max-width: 1024px) {
            .logo { width: 30%; }
            .nav { gap: 20px; }
            .nav-links { font-size: 14px; }
            .lang-switch { font-size: 10px; }
            .section-title { top: 22%; left: 4%; }
            .section-title h2 { font-size: 18px; }
            .icons-grid { grid-template-columns: repeat(2, 1fr); }
            .annotation { font-size: 12px; position: static !important; transform: none !important; width: auto !important; margin: 10px 0; }
            .annotation::before { content: '> '; float: none; margin-right: 4px; }
            .annotation::after { display: none; }
        }

        @media (max-width: 768px) {
            .logo { top: 1%; width: 40%; }
            .nav { top: 2%; right: 2%; gap: 15px; }
            .nav-links { font-size: 14px; }
            .lang-switch { font-size: 10px; }
            .section-title { top: 22%; left: 4%; }
            .section-title h2 { font-size: 20px; }
            .tech-line-wrapper { width: 40%; }
            .icons-grid { grid-template-columns: 1fr; }
            .icon-emoji { font-size: 48px; }
            .icon-name { font-size: 14px; }
            .icon-desc { font-size: 12px; }
            .icons-banner h3 { font-size: 18px; }
            .icons-banner p { font-size: 14px; }
            .icon-tag { font-size: 12px; }
            .modal-window { width: 98%; }
        }
    </style>
</head>
<body>
    <div class="scan-line"></div>
    
    <div class="hero">
        <div class="logo" onclick="goToIndex()" style="cursor: pointer;">
            <img src="./assets/logo-wendy.svg" alt="Wendy" />
        </div>

        <nav class="nav">
            <button class="lang-switch">EN/中文</button>
            <a href="works.html" class="nav-links">Works</a>
            <a href="#about" class="nav-links">About</a>
            <a href="#contact" class="nav-links">Contact</a>
        </nav>

        <div class="section-title">
            <h2>4.Icons</h2>
            <div class="tech-line-wrapper">
                <div class="tech-square-start"></div>
                <div class="tech-line-path"></div>
            </div>
        </div>

        <div class="icons-showcase">
            <div class="icons-grid">
                <div class="icon-card">
                    <img src="./assets/icons_home.png" alt="Home Icon" class="icon-emoji" />
                    <div class="icon-name">Home Icon</div>
                    <div class="icon-desc">主界面图标</div>
                </div>

                <div class="icon-card">
                    <img src="./assets/icons_members.png" alt="Members Icon" class="icon-emoji" />
                    <div class="icon-name">Members Icon</div>
                    <div class="icon-desc">成员介绍图标</div>
                </div>

                <div class="icon-card">
                    <img src="./assets/icons_album.png" alt="Album Icon" class="icon-emoji" />
                    <div class="icon-name">Album Icon</div>
                    <div class="icon-desc">专辑展示图标</div>
                </div>

                <div class="icon-card">
                    <img src="./assets/icons_video.png" alt="Video Icon" class="icon-emoji" />
                    <div class="icon-name">Video Icon</div>
                    <div class="icon-desc">视频界面图标</div>
                </div>

                <div class="icon-card" >
                    <img src="./assets/icons_fanboard.png" alt="Fan Board Icon" class="icon-emoji" />
                    <div class="icon-name">Fan Board Icon</div>
                    <div class="icon-desc">社交媒体图标</div>
                </div>
            </div>

            <div class="icons-banner">
                <h3>图标设计说明</h3>
                <p>灵感来源女团Newjeans的应援棒样式顶端的小兔子图案。</p>
                <div style="margin-top: 20px;">
                    <span class="icon-tag">扁平化风格</span>
                    <span class="icon-tag">填充风格</span>
                    <span class="icon-tag">实心风格</span>
                    <span class="icon-tag">线性风格</span>
                    <span class="icon-tag">简约风格</span>
                </div>
            </div>
        </div>

        <div class="annotation annotation-top">以newjeans为主题的图标设计作品</div>
        <div class="annotation annotation-bottom">先画了草图再在figma里用钢笔工具绘制而成</div>
    </div>

    <div class="modal-overlay" id="iconModal">
        <div class="modal-window">
            <div class="window-titlebar">
                <div style="width: 60px;"></div>
                <div class="window-title" id="modalTitle">Icon Details</div>
                <button class="window-close-btn" onclick="closeModal()">×</button>
            </div>
            <div class="window-content">
                <img src="./assets/work-card-1.png" alt="Icon Detail 1" />
                <img src="./assets/work-card-2-2cc0ae.png" alt="Icon Detail 2" />
            </div>
        </div>
    </div>

    <script>
        function openModal(title) {
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('iconModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('iconModal').classList.remove('active');
        }

        document.getElementById('iconModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModal();
            }
        });

        // 点击 Wendy logo 返回首页
        function goToIndex() {
            document.body.style.transition = 'opacity 0.5s ease';
            document.body.style.opacity = '0';
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 500);
        }
    </script>
</body>
</html>

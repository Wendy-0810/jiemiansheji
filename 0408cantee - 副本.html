<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>市井火锅·大排档 - 烟火人间味</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&family=Ma+Shan+Zheng&display=swap');

        :root {
            --warm-bg: #FFF9F0;
            --paper-light: #FFFCF7;
            --retro-red: #C8332E;
            --retro-orange: #F39C12;
            --wood-brown: #5D4037;
            --text-main: #3E2723;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: #EED9A7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 12px;
        }
        .title-font { font-family: 'Ma Shan Zheng', cursive; }

        .phone-frame {
            max-width: 390px;
            width: 100%;
            margin: 0 auto;
            border: 10px solid var(--wood-brown);
            border-radius: 42px;
            overflow: hidden;
            box-shadow: 0 25px 45px rgba(93, 64, 55, 0.4);
            background: var(--warm-bg);
            height: 780px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .app-header {
            background: linear-gradient(135deg, var(--retro-red), #E57373);
            padding: 18px 16px 12px;
            color: white;
            text-align: center;
            border-bottom: 3px solid var(--retro-orange);
        }

        .retro-card {
            background: var(--paper-light);
            border: 1px solid #F0E2CE;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02), 0 1px 0 #EAD9C0;
            border-radius: 20px;
            transition: all 0.15s;
        }
        .retro-card:active { transform: translateY(1px); }

        .btn-primary {
            background: linear-gradient(135deg, var(--retro-red), var(--retro-orange));
            color: white;
            box-shadow: 0 4px 0 #922B21;
            transition: 0.07s linear;
        }
        .btn-primary:active { transform: translateY(2px); box-shadow: 0 1px 0 #922B21; }

        .bottom-nav {
            background: #FFFFFFEE;
            backdrop-filter: blur(10px);
            border-top: 1px solid #F3E5C6;
            padding: 4px 0 8px;
        }
        .nav-item {
            transition: all 0.1s;
            cursor: pointer;
        }
        .nav-item.active { color: var(--retro-red); transform: translateY(-2px); }

        .stars i { cursor: pointer; transition: 0.1s; }
        .stars i.active-star { color: #FBBF24; text-shadow: 0 0 2px orange; }

        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-track { background: #F1E5D2; }
        ::-webkit-scrollbar-thumb { background: var(--retro-orange); border-radius: 10px; }

        @keyframes pulse-wait {
            0% { opacity: 0.7; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.02); background-color: #ffedd5; }
            100% { opacity: 0.7; transform: scale(1); }
        }
        .wait-card-animation { animation: pulse-wait 1.8s infinite ease-in-out; }

        @keyframes pop-number {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); color: #C8332E; }
            100% { transform: scale(1); }
        }
        .wait-number-pop { animation: pop-number 0.3s ease; }

        .btn-disabled { opacity: 0.5; pointer-events: none; filter: grayscale(0.3); }

        /* 排队+订座双栏切换 */
        .tab-switch {
            display: flex;
            background: #f1e5d2;
            border-radius: 30px;
            padding: 4px;
            margin: 0 16px 12px;
        }
        .tab-switch .switch-item {
            flex: 1;
            text-align: center;
            padding: 8px 0;
            border-radius: 30px;
            font-weight: 600;
            color: #7a6a5a;
            transition: 0.2s;
            cursor: pointer;
        }
        .tab-switch .switch-item.active {
            background: white;
            color: var(--retro-red);
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
    </style>
</head>
<body>

<div class="phone-frame">
    <!-- 状态栏 -->
    <div class="h-6 bg-transparent flex justify-between px-6 items-center text-[10px] text-gray-700 absolute w-full z-50 pt-1">
        <span>18:30</span>
        <div class="flex gap-1"><i class="fas fa-signal"></i><i class="fas fa-battery-three-quarters"></i></div>
    </div>

    <div id="app" class="flex-1 overflow-y-auto pt-6 flex flex-col">
        <div id="page-container" class="flex-1"></div>
    </div>

    <!-- 底部导航 (5项) 保留评价入口 -->
    <div id="bottom-tab-bar" class="bottom-nav grid grid-cols-5 text-center text-gray-600">
        <div class="nav-item flex flex-col items-center py-1" data-tab="home">
            <i class="fas fa-home text-xl"></i>
            <span class="text-[10px] mt-1">首页</span>
        </div>
        <div class="nav-item flex flex-col items-center py-1 active" data-tab="reserveQueue">
            <i class="fas fa-calendar-alt text-xl"></i>
            <span class="text-[10px] mt-1">排队·订座</span>
        </div>
        <div class="nav-item flex flex-col items-center py-1" data-tab="points">
            <i class="fas fa-coins text-xl"></i>
            <span class="text-[10px] mt-1">积分</span>
        </div>
        <div class="nav-item flex flex-col items-center py-1" data-tab="reviews">
            <i class="fas fa-star text-xl"></i>
            <span class="text-[10px] mt-1">评价</span>
        </div>
        <div class="nav-item flex flex-col items-center py-1" data-tab="profile">
            <i class="fas fa-user text-xl"></i>
            <span class="text-[10px] mt-1">我的</span>
        </div>
    </div>
</div>

<script>
    // ---------- 全局状态 ----------
    let appState = {
        currentTab: 'reserveQueue',
        reservation: {
            date: '3月16日 周六',
            time: '18:30',
            people: 4,
            booth: '市井包「贰号」',
            boothId: 'booth2'
        },
        cart: { items: [], total: 0, count: 0 },
        userPoints: 128,
        dishReviews: [
            { dishId: 'maodu', dishName: '脆爽毛肚', rating: 0, comment: '' },
            { dishId: 'feiniu', dishName: '精品肥牛', rating: 0, comment: '' },
            { dishId: 'shengcai', dishName: '老农生菜', rating: 0, comment: '' },
            { dishId: 'xiaosurou', dishName: '老街小酥肉', rating: 0, comment: '' }
        ],
        shareCount: 0,
        redeemedCoupons: [],
        queue: {
            currentNumber: null,
            peopleCount: 2,
            estimatedWaitMinutes: 0,
            isActive: false,
            lastUpdateTime: null,
            frontQueues: 12
        }
    };

    const menuDB = [
        { id: 'maodu', name: '脆爽毛肚', price: 38, desc: '八秒即熟，爽脆可口', img: 'https://images.unsplash.com/photo-1599487488170-d11ec9c172f0?auto=format&fit=crop&w=150&q=80' },
        { id: 'feiniu', name: '精品肥牛', price: 58, desc: '纹理清晰，肉质细腻', img: 'https://images.unsplash.com/photo-1629119915600-bf4519d3e7f6?auto=format&fit=crop&w=150&q=80' },
        { id: 'shengcai', name: '老农生菜', price: 12, desc: '清爽去腻', img: 'https://images.unsplash.com/photo-1512621776951-a57141f2eefd?auto=format&fit=crop&w=150&q=80' },
        { id: 'xiaosurou', name: '老街小酥肉', price: 28, desc: '现炸酥脆', img: 'https://images.unsplash.com/photo-1623341214825-9f4f963727da?auto=format&fit=crop&w=150&q=80' }
    ];

    // ----- 购物车 -----
    function addToCart(dish) {
        const existing = appState.cart.items.find(i => i.id === dish.id);
        if(existing) existing.qty += 1;
        else appState.cart.items.push({ ...dish, qty: 1 });
        recalcCart();
        renderCurrentPage();
    }

    function recalcCart() {
        let total = 0, count = 0;
        appState.cart.items.forEach(item => {
            total += item.price * item.qty;
            count += item.qty;
        });
        appState.cart.total = total;
        appState.cart.count = count;
    }

    function addPointsByAmount(amount) {
        let earned = Math.floor(amount / 10);
        if(earned > 0) { appState.userPoints += earned; return earned; }
        return 0;
    }

    function doShare() {
        appState.shareCount += 1;
        appState.userPoints += 20;
        alert(`✨ 分享成功！获得 20 积分，当前总积分 ${appState.userPoints}`);
        renderCurrentPage();
    }

    function redeemCoupon(pointsCost, couponName) {
        if(appState.redeemedCoupons.includes(couponName)) {
            alert(`您已兑换过 ${couponName}，请勿重复兑换`);
            return;
        }
        if(appState.userPoints >= pointsCost) {
            appState.userPoints -= pointsCost;
            appState.redeemedCoupons.push(couponName);
            alert(`🎉 兑换成功！获得 ${couponName}，已保存至“我的卡包”`);
            renderCurrentPage();
        } else {
            alert(`积分不足，还差 ${pointsCost - appState.userPoints} 分~ 多来店里涮火锅吧！`);
        }
    }

    function submitReview(dishId, rating, commentText) {
        const review = appState.dishReviews.find(r => r.dishId === dishId);
        if(review) { review.rating = rating; review.comment = commentText; }
        appState.userPoints += 10;
        alert(`感谢点评！获得10积分❤️ 当前积分${appState.userPoints}`);
        renderCurrentPage();
    }

    function completeReservation(selectedBoothName) {
        appState.reservation.booth = selectedBoothName;
        showPageView('menu');
    }

    function finalizeOrder() {
        if(appState.cart.total === 0) {
            alert('至少点一道菜再预订吧~ 火锅要热热闹闹！');
            return;
        }
        const earned = addPointsByAmount(appState.cart.total);
        alert(`🎊 预订成功！本次消费预点金额 ¥${appState.cart.total}，获得 ${earned} 积分！🎊`);
        showPageView('success');
    }

    // ----- 排队核心 -----
    function calculateWaitTime(frontQueues) {
        let base = frontQueues * 9;
        let random = Math.floor(Math.random() * 12) - 4;
        return Math.max(5, base + random);
    }

    function refreshQueueStatus() {
        if(!appState.queue.isActive) return;
        let decrease = Math.floor(Math.random() * 3);
        let newFront = Math.max(0, appState.queue.frontQueues - decrease);
        appState.queue.frontQueues = newFront;
        let newWait = calculateWaitTime(newFront);
        appState.queue.estimatedWaitMinutes = newWait;

        if(newFront === 0 && appState.queue.isActive) {
            alert(`🎉 叮叮叮！您的号 ${appState.queue.currentNumber} 到啦！请到前台确认入座~`);
            appState.queue.isActive = false;
            appState.queue.currentNumber = null;
            renderCurrentPage();
            return;
        }
        if(appState.currentTab === 'reserveQueue') {
            renderReserveQueuePage(document.getElementById('page-container'));
        } else {
            renderCurrentPage();
        }
    }

    let queueInterval = null;
    function startQueueSimulation() {
        if(queueInterval) clearInterval(queueInterval);
        queueInterval = setInterval(() => {
            if(appState.queue.isActive) refreshQueueStatus();
        }, 10000);
    }

    function takeQueueNumber(peopleCount) {
        if(appState.queue.isActive) {
            alert(`您当前已有排队号 ${appState.queue.currentNumber}，请勿重复取号~`);
            return;
        }
        let randomNum = Math.floor(Math.random() * 90) + 10;
        let queueCode = `A${randomNum}`;
        let frontCount = Math.floor(Math.random() * 18) + 6;
        let waitMins = calculateWaitTime(frontCount);
        appState.queue = {
            ...appState.queue,
            currentNumber: queueCode,
            peopleCount: peopleCount || 2,
            estimatedWaitMinutes: waitMins,
            isActive: true,
            frontQueues: frontCount,
            lastUpdateTime: new Date()
        };
        alert(`✅ 取号成功！号码: ${queueCode}，前方 ${frontCount} 桌，预计 ${waitMins} 分钟`);
        showPageView('reserveQueue');
        startQueueSimulation();
    }

    function cancelQueue() {
        if(appState.queue.isActive) {
            appState.queue.isActive = false;
            appState.queue.currentNumber = null;
            alert('已取消排队，欢迎随时重新取号。');
            renderCurrentPage();
        } else {
            alert('当前没有进行中的排队');
        }
    }

    // ========== 合并页面：排队 + 订座 (Tab切换) ==========
    function renderReserveQueuePage(container) {
        // 子tab: 'queue' 或 'reserve'
        const subTab = window._reserveSubTab || 'queue';
        const queueActive = appState.queue.isActive;

        let queueHtml = '';
        if(!queueActive) {
            queueHtml = `
                <div class="p-4 flex flex-col items-center">
                    <div class="w-20 h-20 bg-orange-100 rounded-full flex items-center justify-center text-orange-500 text-4xl mb-3"><i class="fas fa-hourglass-half"></i></div>
                    <h3 class="font-bold text-lg">取号排队</h3>
                    <p class="text-xs text-gray-500 text-center">当前等位约25~40分钟</p>
                    <div class="flex items-center gap-3 my-3">
                        <span class="text-sm">👥 人数</span>
                        <button onclick="let s=document.getElementById('qPeople'); let v=parseInt(s.innerText); if(v>1){s.innerText=v-1;}" class="w-7 h-7 rounded-full bg-gray-200 font-bold text-sm">-</button>
                        <span id="qPeople" class="text-lg font-bold">2</span>
                        <button onclick="let s=document.getElementById('qPeople'); let v=parseInt(s.innerText); if(v<10){s.innerText=v+1;}" class="w-7 h-7 rounded-full bg-gray-200 font-bold text-sm">+</button>
                    </div>
                    <button onclick="takeQueueNumber(parseInt(document.getElementById('qPeople').innerText))" class="btn-primary px-8 py-2.5 rounded-2xl font-bold">取号排队</button>
                </div>
            `;
        } else {
            let progress = Math.min(100, Math.max(5, 100 - Math.floor(appState.queue.frontQueues / 30 * 100)));
            queueHtml = `
                <div class="p-4 bg-orange-50/60 rounded-2xl mx-4 mt-2 wait-card-animation border border-orange-200">
                    <div class="flex justify-between items-center">
                        <div><span class="text-xs bg-red-100 text-red-700 px-2 py-0.5 rounded-full">🔥 排队中</span></div>
                        <span class="text-sm font-bold text-red-600">${appState.queue.currentNumber}</span>
                    </div>
                    <div class="flex justify-between text-sm mt-2"><span>前方 ${appState.queue.frontQueues} 桌</span><span>⏱️ ${appState.queue.estimatedWaitMinutes} 分钟</span></div>
                    <div class="mt-2 bg-gray-200 rounded-full h-2 overflow-hidden"><div class="bg-gradient-to-r from-orange-500 to-red-500 h-2 rounded-full" style="width:${progress}%"></div></div>
                    <div class="flex gap-2 mt-3">
                        <button onclick="showPageView('reserveQueue'); window._reserveSubTab='queue'; renderCurrentPage();" class="flex-1 bg-red-600 text-white text-xs py-1.5 rounded-full">查看详情</button>
                        <button onclick="cancelQueue()" class="flex-1 bg-gray-300 text-gray-700 text-xs py-1.5 rounded-full">取消排队</button>
                    </div>
                </div>
            `;
        }

        const reserveHtml = `
            <div class="p-4 space-y-3">
                <div class="bg-white rounded-2xl p-4 shadow-sm"><p class="text-xs text-gray-500">就餐日期</p><div class="flex gap-3 mt-1"><div class="bg-red-50 border-2 border-red-500 rounded-2xl px-4 py-1 text-center"><p class="text-xs">周六</p><p class="text-lg font-bold">16</p></div><div class="text-gray-400 px-3 py-1 text-center"><p>周日 17</p></div></div></div>
                <div class="grid grid-cols-2 gap-3"><div class="bg-white p-3 rounded-2xl"><p class="text-xs text-gray-500">时间</p><select id="resTime" class="w-full font-bold text-sm"><option>18:00</option><option selected>18:30</option><option>19:00</option></select></div><div class="bg-white p-3 rounded-2xl"><p class="text-xs text-gray-500">人数</p><div class="flex items-center justify-between"><button onclick="document.getElementById('rPeople').innerText = Math.max(1, parseInt(document.getElementById('rPeople').innerText)-1)" class="text-red-500 font-bold">-</button><span id="rPeople" class="text-lg font-bold">4</span><button onclick="document.getElementById('rPeople').innerText = Math.min(10, parseInt(document.getElementById('rPeople').innerText)+1)" class="text-red-500 font-bold">+</button></div></div></div>
                <div><h4 class="font-bold text-sm mb-2">可选包间</h4><div onclick="window.selectedBooth='市井包「贰号」'" class="retro-card p-3 border-2 border-orange-500"><div class="flex gap-3"><img src="https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?auto=format&fit=crop&w=80&q=80" class="w-16 h-16 rounded-xl object-cover"><div><p class="font-bold text-sm">市井包「贰号」</p><p class="text-xs text-gray-500">4-6人 · 临街靠窗</p><p class="text-red-600 font-bold text-sm">¥0 附加费</p></div></div></div><div class="retro-card p-3 mt-2 opacity-50 grayscale"><div class="flex gap-3"><img src="https://images.unsplash.com/photo-1552566626-52f8b828add9?auto=format&fit=crop&w=80&q=80" class="w-16 h-16 rounded-xl"><div><p class="font-bold text-sm">老街包「壹号」</p><p class="text-xs text-gray-400">已满</p></div></div></div></div>
                <button onclick="completeReservation('市井包「贰号」')" class="btn-primary w-full py-3 rounded-2xl font-bold">选菜锁鲜 →</button>
            </div>
        `;

        container.innerHTML = `
            <div class="flex-1 overflow-y-auto pb-4">
                <div class="app-header">
                    <h1 class="title-font text-3xl">市井火锅</h1>
                    <p class="text-[10px] tracking-[4px] opacity-90">排队 · 订座</p>
                </div>
                <!-- 子Tab切换 -->
                <div class="tab-switch">
                    <div class="switch-item ${subTab === 'queue' ? 'active' : ''}" onclick="window._reserveSubTab='queue'; renderCurrentPage();">排队等位</div>
                    <div class="switch-item ${subTab === 'reserve' ? 'active' : ''}" onclick="window._reserveSubTab='reserve'; renderCurrentPage();">预订包厢</div>
                </div>
                ${subTab === 'queue' ? queueHtml : reserveHtml}
            </div>
        `;
        // 如果排队激活，切到排队子页时自动显示排队详情
        if(subTab === 'queue' && appState.queue.isActive) {
            // 已经显示排队卡片了
        }
    }

    // ----- 其他页面渲染 (保留评价) -----
    function renderHomePage(container) {
        let queueCard = '';
        if(appState.queue.isActive) {
            queueCard = `
                <div class="mt-3 retro-card p-3 bg-orange-50 border-orange-300 flex justify-between items-center">
                    <div><i class="fas fa-hourglass-half text-orange-500"></i> <span class="text-sm font-bold">排队中 ${appState.queue.currentNumber}</span><p class="text-xs text-gray-500">前方${appState.queue.frontQueues}桌 · 约${appState.queue.estimatedWaitMinutes}分钟</p></div>
                    <button onclick="showPageView('reserveQueue')" class="bg-red-600 text-white px-4 py-1 rounded-full text-xs">查看详情</button>
                </div>
            `;
        } else {
            queueCard = `
                <div class="mt-3 retro-card p-3 bg-amber-50 flex justify-between items-center">
                    <span class="text-sm"><i class="fas fa-utensils"></i> 晚餐高峰预计等位25~40分钟</span>
                    <button onclick="showPageView('reserveQueue')" class="text-red-600 text-sm font-bold">排队/订座→</button>
                </div>
            `;
        }
        container.innerHTML = `
            <div class="flex flex-col h-full">
                <div class="app-header">
                    <h1 class="title-font text-4xl">市井火锅</h1>
                    <p class="text-[10px] tracking-[4px] opacity-90">Downtown Hotpot Stall</p>
                </div>
                <div class="p-4">
                    <div class="relative rounded-2xl overflow-hidden h-40 shadow-lg">
                        <img src="https://images.unsplash.com/photo-1555126634-323283e090fa?auto=format&fit=crop&w=600&q=80" class="w-full h-full object-cover">
                        <div class="absolute inset-0 bg-gradient-to-t from-orange-900/60 to-transparent"></div>
                        <div class="absolute bottom-3 left-3 text-white"><span class="bg-yellow-400 text-red-700 text-[10px] font-bold px-2 py-0.5 rounded">人声鼎沸</span><h2 class="text-white text-xl font-bold">老街里的烟火气</h2></div>
                    </div>
                    ${queueCard}
                </div>
                <div class="grid grid-cols-2 gap-4 px-4">
                    <button onclick="showPageView('reserveQueue')" class="btn-primary h-32 rounded-2xl flex flex-col items-center justify-center gap-2">
                        <div class="bg-white/20 p-3 rounded-full"><i class="fas fa-calendar-check text-2xl"></i></div>
                        <span class="text-lg font-bold">排队/订座</span>
                    </button>
                    <div class="space-y-3">
                        <button onclick="showPageView('reserveQueue')" class="w-full bg-white border-2 border-orange-200 h-14 rounded-2xl flex items-center justify-center gap-2 text-orange-600 font-bold"><i class="fas fa-list-ol"></i> 取号排队</button>
                        <button class="w-full bg-white border-2 border-orange-200 h-14 rounded-2xl flex items-center justify-center gap-2 text-orange-600 font-bold"><i class="fas fa-gift"></i> 限时活动</button>
                    </div>
                </div>
                <div class="px-4 mt-6 pb-6">
                    <h3 class="font-bold border-l-4 border-red-600 pl-2 mb-4">今日主打菜</h3>
                    <div class="flex gap-4 overflow-x-auto pb-2">
                        ${menuDB.slice(0,2).map(d => `<div class="retro-card min-w-[140px] p-2"><img src="${d.img}" class="rounded-xl h-24 w-full object-cover"><p class="text-sm font-bold mt-2">${d.name}</p><p class="text-red-600 font-bold">¥${d.price}</p></div>`).join('')}
                    </div>
                </div>
            </div>
        `;
    }

    function renderMenuPage(container) {
        container.innerHTML = `
            <div class="flex flex-col h-full bg-white">
                <div class="p-4 bg-orange-50 flex justify-between items-center"><button onclick="showPageView('reserveQueue')" class="text-red-600"><i class="fas fa-chevron-left"></i> 返回</button><span class="font-bold">预点单 · ${appState.reservation.booth}</span><span class="text-xs bg-white px-2 py-1 rounded-full">${appState.reservation.people}人</span></div>
                <div class="flex-1 overflow-y-auto p-4 space-y-5">
                    ${menuDB.map(dish => `
                        <div class="flex gap-4 items-center">
                            <img src="${dish.img}" class="w-20 h-20 rounded-2xl object-cover border">
                            <div class="flex-1"><h4 class="font-bold">${dish.name}</h4><p class="text-xs text-gray-400">${dish.desc}</p><p class="font-bold text-red-600">¥${dish.price}</p></div>
                            <button onclick="addToCart({id:'${dish.id}',name:'${dish.name}',price:${dish.price},img:'${dish.img}'})" class="w-10 h-10 rounded-full bg-red-100 text-red-600 text-xl font-bold">+</button>
                        </div>
                    `).join('')}
                </div>
                <div class="p-4 border-t bg-white flex justify-between items-center">
                    <div><p class="text-xs text-gray-400">已点 <span id="cartCountSpan">${appState.cart.count}</span> 项</p><p class="text-xl font-bold text-red-600">¥<span id="cartTotalSpan">${appState.cart.total}</span></p></div>
                    <button onclick="finalizeOrder()" id="finalOrderBtn" class="btn-primary px-8 py-4 rounded-2xl font-bold ${appState.cart.total === 0 ? 'btn-disabled' : ''}">立即预订</button>
                </div>
            </div>
        `;
        const updateMenuUI = () => {
            const countSpan = document.getElementById('cartCountSpan');
            const totalSpan = document.getElementById('cartTotalSpan');
            const btn = document.getElementById('finalOrderBtn');
            if(countSpan) countSpan.innerText = appState.cart.count;
            if(totalSpan) totalSpan.innerText = appState.cart.total;
            if(btn) {
                if(appState.cart.total === 0) btn.classList.add('btn-disabled');
                else btn.classList.remove('btn-disabled');
            }
        };
        updateMenuUI();
        window._updateMenuUI = updateMenuUI;
    }

    function renderSuccessPage(container) {
        container.innerHTML = `
            <div class="flex-1 flex flex-col items-center justify-center text-white p-8 text-center" style="background:radial-gradient(circle, #F44336, #C62828);">
                <div class="w-24 h-24 bg-yellow-400 rounded-full flex items-center justify-center text-red-600 text-5xl shadow-2xl"><i class="fas fa-check"></i></div>
                <h2 class="title-font text-5xl mt-4 mb-2">预订成功！</h2>
                <p class="opacity-80 text-sm">${appState.reservation.booth} · ${appState.reservation.people}人 · 周六18:30</p>
                <div class="bg-white/20 backdrop-blur-md rounded-2xl p-5 w-full mt-6 text-left"><p class="flex justify-between"><span>预付定金</span><span>¥50</span></p><p class="flex justify-between"><span>预点金额</span><span>¥${appState.cart.total}</span></p><hr class="my-2 opacity-30"><p class="text-xs">获得积分: ${Math.floor(appState.cart.total/10)}</p></div>
                <button onclick="showPageView('home')" class="mt-6 bg-white text-red-600 w-full py-4 rounded-3xl font-bold">返回首页</button>
                <button onclick="showPageView('profile')" class="mt-3 bg-white/30 text-white w-full py-3 rounded-3xl font-bold border border-white/40">查看我的预订</button>
            </div>
        `;
    }

    function renderPointsPage(container) {
        const couponList = [
            { name: '🧧 红糖冰粉', cost: 50, value: '价值¥12' },
            { name: '🍺 重庆纯生啤酒2瓶', cost: 120, value: '价值¥28' },
            { name: '🥩 手切鲜牛肉1份', cost: 200, value: '价值¥48' }
        ];
        container.innerHTML = `
            <div class="p-5 bg-amber-50/40 flex-1">
                <div class="flex justify-between items-center"><h2 class="text-2xl font-bold"><i class="fas fa-coins text-yellow-600"></i> 积分粮票</h2><span class="bg-red-600 text-white px-4 py-1 rounded-full text-lg font-bold">${appState.userPoints} 分</span></div>
                <div class="bg-gradient-to-r from-orange-400 to-red-500 rounded-2xl p-5 text-white mt-4 shadow-lg"><p class="text-sm">消费¥10 = 1积分</p><p class="font-bold text-2xl">兑换热辣好礼</p></div>
                <div class="mt-6 space-y-4">
                    ${couponList.map(c => {
                        const redeemed = appState.redeemedCoupons.includes(c.name);
                        return `
                            <div class="retro-card p-4 flex justify-between items-center ${redeemed ? 'opacity-60 grayscale' : ''}">
                                <div><p class="font-bold">${c.name}</p><p class="text-xs text-gray-500">${c.value}</p></div>
                                <button onclick="${redeemed ? '' : `redeemCoupon(${c.cost},'${c.name}')`}" class="${redeemed ? 'bg-gray-400' : 'bg-orange-500'} text-white px-4 py-2 rounded-full text-sm">${redeemed ? '已兑换' : '兑换'}</button>
                            </div>
                        `;
                    }).join('')}
                </div>
                <div class="mt-6 p-3 bg-white rounded-xl text-center text-xs text-gray-500">到店出示兑换码即可享用</div>
            </div>
        `;
    }

    // 评价页面 (保留)
    function renderReviewsPage(container) {
        container.innerHTML = `
            <div class="p-5 flex-1 bg-white overflow-y-auto">
                <h2 class="text-2xl font-bold border-b-2 border-orange-300 pb-2">🔥 菜品点评 · 获积分</h2>
                <p class="text-xs text-gray-500 mt-1">点评每道菜可得10积分</p>
                <div class="mt-5 space-y-6 pb-6">
                    ${menuDB.map(dish => {
                        const review = appState.dishReviews.find(r => r.dishId === dish.id) || { rating: 0, comment: '' };
                        const rating = review.rating || 0;
                        const comment = review.comment || '';
                        return `
                            <div class="retro-card p-4" data-dish="${dish.id}">
                                <div class="flex gap-3">
                                    <img src="${dish.img}" class="w-16 h-16 rounded-xl object-cover">
                                    <div><p class="font-bold">${dish.name}</p>
                                    <div class="stars flex gap-1 text-2xl text-gray-300 mt-1" data-dishid="${dish.id}">
                                        ${[1,2,3,4,5].map(s => `<i class="${rating >= s ? 'fa-solid active-star' : 'fa-regular fa-star'}" data-star="${s}"></i>`).join('')}
                                    </div></div>
                                </div>
                                <textarea id="comment-${dish.id}" class="w-full border rounded-xl p-2 mt-2 text-sm" placeholder="分享你的火锅体验...">${comment}</textarea>
                                <button onclick="submitReview('${dish.id}', window.tempRating['${dish.id}']||0, document.getElementById('comment-${dish.id}').value)" class="mt-2 bg-red-500 text-white px-4 py-1 rounded-full text-sm w-full">提交点评 +10积分</button>
                            </div>
                        `;
                    }).join('')}
                </div>
            </div>
        `;
        setTimeout(() => {
            window.tempRating = window.tempRating || {};
            appState.dishReviews.forEach(r => { if(r.rating) window.tempRating[r.dishId] = r.rating; });
            document.querySelectorAll('.stars').forEach(starContainer => {
                const dishId = starContainer.dataset.dishid;
                const starsIcons = starContainer.querySelectorAll('i');
                starsIcons.forEach(star => {
                    star.addEventListener('click', (e) => {
                        const starVal = parseInt(star.dataset.star);
                        window.tempRating[dishId] = starVal;
                        starsIcons.forEach((s, idx) => {
                            if(idx < starVal) { s.className = 'fa-solid active-star'; }
                            else { s.className = 'fa-regular fa-star'; }
                        });
                    });
                });
                const saved = window.tempRating[dishId] || 0;
                starsIcons.forEach((s, idx) => {
                    if(idx < saved) { s.className = 'fa-solid active-star'; }
                    else { s.className = 'fa-regular fa-star'; }
                });
            });
        }, 30);
    }

    function renderProfilePage(container) {
        container.innerHTML = `
            <div class="p-5 flex-1 bg-gradient-to-b from-orange-50 to-white overflow-y-auto">
                <div class="flex items-center gap-4">
                    <div class="w-16 h-16 bg-red-600 rounded-full flex items-center justify-center text-white text-3xl"><i class="fas fa-utensils"></i></div>
                    <div><h3 class="font-bold text-xl">辣妹子·老饕</h3><p class="text-xs text-gray-500">会员等级: 沸腾食客</p><div class="flex gap-1 mt-1"><i class="fas fa-coins text-yellow-500"></i><span class="font-bold">${appState.userPoints} 积分</span></div></div>
                </div>
                <div class="mt-6 bg-white rounded-2xl p-5 shadow-sm">
                    <p class="font-bold flex justify-between"><span>我的订单</span><span class="text-red-500">查看全部 ></span></p>
                    <div class="flex justify-around mt-4"><div><i class="fas fa-hourglass-half text-2xl text-gray-500"></i><p class="text-xs">待使用</p></div><div><i class="fas fa-check-circle text-2xl text-green-600"></i><p>已完成</p></div></div>
                </div>
                <div class="mt-6 bg-red-50 rounded-2xl p-5 border border-red-200">
                    <div class="flex justify-between items-center"><div><p class="font-bold"><i class="fas fa-share-alt text-red-600"></i> 分享有礼</p><p class="text-xs">每次得20积分</p></div><button onclick="doShare()" class="bg-red-600 text-white px-6 py-2 rounded-full shadow-md">立即分享</button></div>
                    <div class="mt-3 text-sm text-gray-500">已分享 ${appState.shareCount} 次 · 累计 +${appState.shareCount*20} 积分</div>
                </div>
                <div class="mt-6 text-center text-xs text-gray-400">市井火锅大排档 · 传承老街味道</div>
            </div>
        `;
    }

    // ----- 路由 -----
    function showPageView(viewId) {
        const validTabs = ['home', 'reserveQueue', 'points', 'reviews', 'profile', 'menu', 'success'];
        if(validTabs.includes(viewId)) {
            appState.currentTab = viewId;
            document.querySelectorAll('.nav-item').forEach(item => {
                const tab = item.dataset.tab;
                if(tab && (tab === viewId)) {
                    item.classList.add('active', 'text-red-600');
                } else {
                    item.classList.remove('active', 'text-red-600');
                }
            });
        }
        const container = document.getElementById('page-container');
        if(!container) return;
        if(viewId === 'home') renderHomePage(container);
        else if(viewId === 'reserveQueue') renderReserveQueuePage(container);
        else if(viewId === 'menu') renderMenuPage(container);
        else if(viewId === 'success') renderSuccessPage(container);
        else if(viewId === 'points') renderPointsPage(container);
        else if(viewId === 'reviews') renderReviewsPage(container);
        else if(viewId === 'profile') renderProfilePage(container);
        else renderHomePage(container);
    }

    function renderCurrentPage() { showPageView(appState.currentTab); }

    // 底部导航点击
    document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', (e) => {
            const tab = item.dataset.tab;
            if(tab) showPageView(tab);
        });
    });

    // 购物车拦截
    const origAdd = addToCart;
    addToCart = function(dish) {
        origAdd(dish);
        if(appState.currentTab === 'menu' && window._updateMenuUI) {
            window._updateMenuUI();
        }
        renderCurrentPage();
    };

    // 初始化
    window._reserveSubTab = 'queue';
    startQueueSimulation();
    showPageView('reserveQueue');

    // 暴露全局
    window.takeQueueNumber = takeQueueNumber;
    window.cancelQueue = cancelQueue;
    window.redeemCoupon = redeemCoupon;
    window.submitReview = submitReview;
    window.doShare = doShare;
    window.addToCart = addToCart;
    window.finalizeOrder = finalizeOrder;
    window.completeReservation = completeReservation;
    window.showPageView = showPageView;
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wendy - Apps</title>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=VT323&display=swap" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,400&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'VT323', monospace;
            background-color: #E6EDF5;
            color: #000000;
            overflow-x: hidden;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }

        @keyframes scanLine {
            0% { top: -100%; }
            100% { top: 100%; }
        }

        @keyframes pulseBorder {
            0%, 100% { border-color: rgba(0,0,0,0.3); }
            50% { border-color: rgba(0,0,0,0.8); }
        }

        .hero {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .scan-line {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: rgba(0,0,0,0.1);
            animation: scanLine 8s linear infinite;
            z-index: 999;
            pointer-events: none;
        }

        .logo {
            position: absolute;
            top: 3%;
            left: 3%;
            width: 8vw;
            max-width: 150px;
            height: auto;
            z-index: 10;
            animation: fadeInUp 0.8s cubic-bezier(0.18, 0.89, 0.32, 1.28) 0.2s both;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        .logo:hover {
            transform: scale(1.1);
            opacity: 0.8;
        }

        .logo svg {
            width: 100%;
            height: 100%;
        }

        .nav {
            position: absolute;
            top: 3%;
            right: 3%;
            display: flex;
            align-items: center;
            gap: 5vw;
            z-index: 10;
            animation: fadeInUp 0.8s cubic-bezier(0.18, 0.89, 0.32, 1.28) 0.3s both;
        }

        .lang-switch {
            font-family: 'DotGothic16', sans-serif;
            font-size: 0.7vw;
            padding: 5px 12px;
            border: 1px solid #000000;
            background: transparent;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }

        .lang-switch:hover {
            background: #000000;
            color: #FFFFFF;
            transform: translateY(-2px);
        }

        .nav-links {
            font-family: 'VT323', monospace;
            font-size: 1.8vw;
            color: #000000;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            position: relative;
        }

        .nav-links:hover {
            opacity: 0.6;
            transform: translateY(-2px);
        }

        .nav-links::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 1px;
            background: #000000;
            transition: width 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }

        .nav-links:hover::after {
            width: 100%;
        }

        .section-title {
            position: absolute;
            top: 18%;
            left: 5%;
            z-index: 10;
            animation: fadeInUp 0.8s cubic-bezier(0.18, 0.89, 0.32, 1.28) 0.4s both;
        }

        .section-title h2 {
            font-family: 'VT323', monospace;
            font-size: 2.2vw;
            font-weight: 400;
            line-height: 1.2em;
            color: #000000;
            text-decoration: underline;
        }

        .tech-line-wrapper {
            position: relative;
            margin-top: 8px;
            width: 20vw;
            display: flex;
            align-items: center;
        }

        .tech-square-start {
            width: 8px;
            height: 8px;
            background: #000000;
            position: relative;
            z-index: 3;
            animation: glitch 2s ease-in-out infinite;
        }

        .tech-line-path {
            position: relative;
            flex: 1;
            height: 1px;
            margin-left: 4px;
            background: repeating-linear-gradient(90deg, #000000 0px, #000000 3px, transparent 3px, transparent 6px);
        }

        .phones-container {
            position: relative;
            width: 80%;
            max-width: 1200px;
            height: 70vh;
            z-index: 50;
            animation: fadeInUp 1s cubic-bezier(0.18, 0.89, 0.32, 1.28) 0.6s both;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8vw;
        }

        .phone-wrapper {
            position: relative;
            width: 25%;
            aspect-ratio: 9/19;
            perspective: 1000px;
            cursor: pointer;
        }

        .phone-wrapper:nth-child(1) {
            transform: rotate(-5deg);
        }

        .phone-wrapper:nth-child(2) {
            transform: rotate(5deg);
        }

        .phone-card {
            width: 100%;
            height: 100%;
            background: #FFFFFF;
            border: 2px solid #000000;
            border-radius: 35px;
            padding: 2px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: pulseBorder 3s ease-in-out infinite;
            overflow: hidden;
            box-shadow: 8px 8px 0 rgba(0, 0, 0, 0.1);
        }

        .phone-wrapper:hover {
            transform: rotate(0deg) scale(1.08);
            z-index: 100;
        }

        .phone-wrapper:hover .phone-card {
            box-shadow: 20px 20px 0 rgba(0, 0, 0, 0.2);
            animation: none;
        }

        .phone-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            border-radius: 33px;
        }

        .phone-card::before {
            content: '';
            position: absolute;
            top: -4px;
            left: -4px;
            right: -4px;
            bottom: -4px;
            border: 1px dashed rgba(0,0,0,0.1);
            border-radius: 38px;
            pointer-events: none;
        }

        

        .annotation {
            position: absolute;
            font-family: 'VT323', monospace;
            font-size: 1vw;
            line-height: 1.3em;
            color: #000000;
            background: rgba(230, 237, 245, 0.95);
            padding: 8px 12px;
            border: 1px solid #000000;
            z-index: 7;
            opacity: 0;
            animation: fadeInUp 0.6s cubic-bezier(0.18, 0.89, 0.32, 1.28) 2s both;
            backdrop-filter: blur(4px);
        }

        .annotation::before {
            content: '';
            position: absolute;
            background: #000000;
        }

        .annotation-phone-top-1 {
            top: -80px;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
        }

        .annotation-phone-top-1::before {
            bottom: -50px;
            left: 50%;
            width: 1px;
            height: 40px;
            transform: translateX(-50%);
        }

        .annotation-phone-top-1::after {
            content: '[]';
            font-size: 0.8em;
            margin-left: 4px;
            color: rgba(0,0,0,0.3);
        }

        .annotation-phone-top-2 {
            top: -70px;
            right: -10px;
            white-space: nowrap;
        }

        .annotation-phone-top-2::before {
            bottom: -45px;
            right: 30%;
            width: 1px;
            height: 35px;
            transform: translateX(-50%);
        }

        .annotation-left {
            top: 50%;
            right: calc(100% + 35px);
            transform: translateY(-50%);
            text-align: right;
            width: 260px;
        }

        .annotation-left::before {
            top: 50%;
            right: -35px;
            width: 35px;
            height: 1px;
            transform: translateY(-50%);
        }

        .annotation-left::after {
            content: '<';
            margin-left: 6px;
            margin-right: 0;
            float: right;
        }

        .annotation-right {
            top: 50%;
            left: calc(100% + 35px);
            width: 16vw;
            transform: translateY(-50%);
        }

        .annotation-right::before {
            top: 50%;
            left: -35px;
            width: 35px;
            height: 1px;
            transform: translateY(-50%);
        }

        .annotation-right::after {
            content: '// design notes';
            display: block;
            font-size: 0.7em;
            color: rgba(0,0,0,0.3);
            margin-top: 6px;
            padding-top: 6px;
            border-top: 1px dashed rgba(0,0,0,0.2);
        }

        .annotation-phone-bottom-1 {
            bottom: -50px;
            left: 20%;
            white-space: nowrap;
        }

        .annotation-phone-bottom-1::before {
            top: -30px;
            left: 50%;
            width: 1px;
            height: 30px;
            transform: translateX(-50%);
        }

        .annotation-phone-bottom-1::after {
            content: 'v';
            margin-left: 8px;
            animation: pulseArrow 1.5s ease-in-out infinite;
        }

        .annotation-phone-bottom-2 {
            bottom: -60px;
            right: 35%;
            white-space: nowrap;
        }

        .annotation-phone-bottom-2::before {
            top: -35px;
            right: 40%;
            width: 1px;
            height: 35px;
            transform: translateX(-50%);
        }

        @keyframes pulseArrow {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-window {
            background: transparent;
            border: 2px solid #000000;
            border-radius: 8px;
            box-shadow: 20px 20px 0 rgba(0, 0, 0, 0.2);
            width: 96%;
            max-width: 1100px;
            max-height: 92vh;
            overflow: hidden;
            transform: scale(0.9) translateY(20px);
            transition: all 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }

        .modal-overlay.active .modal-window {
            transform: scale(1) translateY(0);
        }

        .window-titlebar {
            background: #f0f0f0;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #ddd;
            cursor: move;
        }

        .window-title {
            flex: 1;
            text-align: center;
            font-family: 'VT323', monospace;
            font-size: 1.5vw;
            color: #333;
        }

        .window-close-btn {
            background: none;
            border: none;
            font-size: 20px;
            color: #666;
            cursor: pointer;
            padding: 0 5px;
            transition: all 0.2s;
        }

        .window-close-btn:hover {
            color: #ff5f56;
            transform: scale(1.2);
        }

        .window-content {
            padding: 0;
            background: transparent;
            max-height: calc(85vh - 46px);
            overflow-y: auto;
        }

        .window-content img {
            width: 100%;
            height: auto;
            display: block;
        }

        .design-showcase img {
            width: 100%;
            height: auto;
            display: block;
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 20px;
            padding: 20px;
        }

        .feature-card {
            background: #FFFFFF;
            border: 1px solid #000000;
            padding: 20px;
            transition: all 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }

        .feature-card:hover {
            transform: translateY(-5px);
            box-shadow: 10px 10px 0 rgba(0, 0, 0, 0.1);
        }

        .feature-emoji {
            font-size: 2.5vw;
            margin-bottom: 10px;
        }

        .feature-title {
            font-family: 'VT323', monospace;
            font-size: 1.5vw;
            margin-bottom: 8px;
        }

        .feature-desc {
            font-family: 'VT323', monospace;
            font-size: 1.1vw;
            color: #555555;
            line-height: 1.4em;
        }

        .animation-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 20px;
            padding: 20px;
        }

        .animation-card {
            background: #FFFFFF;
            border: 1px solid #000000;
            padding: 20px;
            text-align: center;
        }

        .animation-demo-box {
            width: 100%;
            height: 140px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #FFFFFF;
            font-family: 'VT323', monospace;
            font-size: 2vw;
            border: 1px solid #000000;
            transition: all 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }

        .anim-scale:hover .animation-demo-box { transform: scale(1.1); border-radius: 15px; }
        .anim-float .animation-demo-box { animation: floatAnim 3s ease-in-out infinite; }
        .anim-glow .animation-demo-box { animation: glowAnim 2s ease-in-out infinite; }
        .anim-slide .animation-demo-box { animation: slideAnim 2s ease-in-out infinite; }
        .anim-rotate .animation-demo-box { animation: rotateAnim 3s linear infinite; }
        .anim-pulse .animation-demo-box { animation: pulseAnim 2s ease-in-out infinite; }

        @keyframes floatAnim { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        @keyframes glowAnim { 0%, 100% { box-shadow: 0 0 20px rgba(102, 126, 234, 0.4); } 50% { box-shadow: 0 0 40px rgba(102, 126, 234, 0.8); } }
        @keyframes slideAnim { 0%, 100% { transform: translateX(0); } 50% { transform: translateX(20px); } }
        @keyframes rotateAnim { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes pulseAnim { 0%, 100% { transform: scale(1); } 50% { transform: scale(0.95); } }

        .animation-name {
            font-family: 'VT323', monospace;
            font-size: 1.2vw;
        }

        .pages-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            margin-top: 20px;
            padding: 20px;
        }

        .page-tag {
            background: #FFFFFF;
            border: 1px solid #000000;
            padding: 15px;
            text-align: center;
            font-family: 'VT323', monospace;
            font-size: 1.3vw;
            transition: all 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            cursor: pointer;
        }

        .page-tag:hover {
            background: #000000;
            color: #FFFFFF;
            transform: translateY(-3px);
            box-shadow: 5px 5px 0 rgba(0, 0, 0, 0.1);
        }

        @media (max-width: 768px) {
            .logo { top: 1%; width: 40%; }
            .nav { top: 2%; right: 2%; gap: 15px; }
            .nav-links { font-size: 14px; }
            .lang-switch { font-size: 10px; }
            .section-title { top: 22%; left: 4%; }
            .section-title h2 { font-size: 20px; }
            .tech-line-wrapper { width: 40%; }
            .phones-container { flex-direction: column; height: auto; gap: 40px; margin-top: 150px; }
            .phone-wrapper { width: 60%; }
            .annotation { font-size: 12px; padding: 8px; position: static !important; transform: none !important; width: auto !important; white-space: normal !important; margin: 10px 0; text-align: left !important; }
            .annotation::before { content: '> '; float: none; margin-right: 4px; }
            .annotation::after { display: none; }
            .modal-title { font-size: 24px; }
            .modal-close-btn { font-size: 16px; }
            .section-heading { font-size: 18px; }
            .features-grid, .animation-grid { grid-template-columns: 1fr; }
            .feature-emoji { font-size: 32px; }
            .feature-title { font-size: 16px; }
            .feature-desc { font-size: 14px; }
            .animation-demo-box { font-size: 18px; }
            .animation-name { font-size: 14px; }
            .pages-grid { grid-template-columns: repeat(2, 1fr); }
            .page-tag { font-size: 14px; }
        }
    </style>
</head>
<body>
    <div class="scan-line"></div>
    
    <div class="hero">
        <div class="logo" onclick="goToIndex()" style="cursor: pointer;">
            <img src="assets/logo-wendy.svg" alt="Wendy" />
        </div>

        <nav class="nav">
            <button class="lang-switch">EN/中文</button>
            <a href="works.html" class="nav-links">Works</a>
            <a href="#about" class="nav-links">About</a>
            <a href="#contact" class="nav-links">Contact</a>
        </nav>

        <div class="section-title">
            <h2>1.Apps</h2>
            <div class="tech-line-wrapper">
                <div class="tech-square-start"></div>
                <div class="tech-line-path"></div>
            </div>
        </div>

        <div class="phones-container">
            <div class="phone-wrapper" onclick="window.location.href='0408cantee%20-%20副本.html'">
                <div class="phone-card">
                    <img src="assets/work-card-4.png" alt="市井火锅App" />
                </div>
                <div class="annotation annotation-phone-top-1">市井火锅App</div>
                <div class="annotation annotation-left">核心功能含排队等位(可取号、看等待时长)、包厢预订、积分兑换、菜品评价、个人中心等，风格复古烟火气，交互贴合线下火锅消费场景</div>
                <div class="annotation annotation-phone-bottom-1">点击卡片查看详细展示</div>
            </div>

            <div class="phone-wrapper" onclick="openDetailModal('newjeans')">
                <div class="phone-card">
                    <img src="assets/work-card-6.png" alt="NewJeans主题App" />
                </div>
                <div class="annotation annotation-phone-top-2">NewJeans主题App<br>涵盖了Home、Members、Album、Video、Fan board五个核心页面，在之前的设计上增加了动效</div>
                <div class="annotation annotation-right">采用了沉浸式视觉设计，整体色调清新活泼，动效流畅自然，增强了用户体验的趣味性和互动性</div>
                <div class="annotation annotation-phone-bottom-2">点击卡片查看详细展示</div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="detailModal">
        <div class="modal-window">
            <div class="window-titlebar">
                <div class="window-title" id="modalTitle">App Preview</div>
                <button class="window-close-btn" onclick="closeDetailModal()">×</button>
            </div>
            <div class="window-content" id="modalContent">
                <img src="assets/work-card-2-2cc0ae.png" alt="市井火锅App详情" />
                <img src="assets/work-card-1.png" alt="NewJeans主题App详情" />
            </div>
        </div>
    </div>

    <script>
        function openDetailModal(type) {
            const modal = document.getElementById('detailModal');
            const title = document.getElementById('modalTitle');
            const content = document.getElementById('modalContent');
            
            if (type === 'hotpot') {
                title.textContent = '市井火锅 App Preview';
                content.innerHTML = '<img src="assets/work-card-2-2cc0ae.png" alt="市井火锅App详情" /><img src="assets/work-card-5.png" alt="市井火锅App详情" />';
            } else {
                title.textContent = 'NewJeans App Preview';
                content.innerHTML = '<img src="assets/appshow1.png" alt="NewJeans主题App详情" /><img src="assets/appshow2.png" alt="NewJeans主题App详情" />';
            }
            
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeDetailModal() {
            document.getElementById('detailModal').classList.remove('active');
            document.body.style.overflow = '';
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeDetailModal();
        });

        document.getElementById('detailModal').addEventListener('click', function(e) {
            if (e.target === this || e.target.classList.contains('window-dot') || e.target.classList.contains('red')) {
                closeDetailModal();
            }
        });

        // 点击 Wendy logo 返回首页
        function goToIndex() {
            document.body.style.transition = 'opacity 0.5s ease';
            document.body.style.opacity = '0';
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 500);
        }
    </script>
</body>
</html>

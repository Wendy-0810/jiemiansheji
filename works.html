<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wendy - Works</title>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=VT323&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'VT323', monospace;
            background-color: #E6EDF5;
            color: #000000;
            overflow-x: hidden;
        }

        .hero {
            position: relative;
            width: 100%;
            min-height: 100vh;
            padding: 20px;
        }

        .logo {
            position: absolute;
            top: 7%;
            left: 4.7%;
            width: 12vw;
            max-width: 220px;
            height: auto;
            z-index: 10;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        .logo:hover {
            transform: scale(1.1);
            opacity: 0.8;
        }

        .logo svg {
            width: 100%;
            height: 100%;
        }

        .nav {
            position: absolute;
            top: 3.6%;
            right: 3.5%;
            display: flex;
            align-items: center;
            gap: 5.2vw;
            z-index: 10;
        }

        .lang-switch {
            font-family: 'DotGothic16', sans-serif;
            font-size: 0.8vw;
            padding: 6px 10px;
            border: 1px solid #000000;
            background: transparent;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .lang-switch:hover {
            background: #000000;
            color: #FFFFFF;
        }

        .nav-links {
            font-family: 'VT323', monospace;
            font-size: 1.9vw;
            font-weight: 400;
            line-height: 0.9em;
            letter-spacing: 0.01em;
            color: #000000;
            text-decoration: none;
            transition: opacity 0.3s ease;
        }

        .nav-links:hover {
            opacity: 0.6;
        }

        .categories {
            position: absolute;
            top: 30%;
            left: 6.4%;
            z-index: 10;
        }

        .category-item {
            font-family: 'VT323', monospace;
            font-size: 2.1vw;
            font-weight: 400;
            line-height: 0.9em;
            letter-spacing: 0.01em;
            color: #000000;
            text-decoration: underline;
            display: block;
            margin-bottom: 2vw;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .category-item:hover {
            color: #555555;
            transform: translateX(10px);
        }

        .work-cards {
            position: relative;
            width: 100%;
            min-height: 100vh;
            padding-left: 25%;
            padding-top: 20%;
        }

        .card {
            position: absolute;
            background: #FFFFFF;
            border: 1px solid #000000;
            padding: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: scale(1.05) rotate(0deg);
            box-shadow: 15px 15px 0 rgba(0, 0, 0, 0.15);
            z-index: 100;
        }

        .card img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* newjeans 网页 */
        .card-1 {
            top: 20%;
            left: 67%;
            width: 24%;
            transform: rotate(7deg);
            z-index: 1;
        }

        /* 游戏签到界面 */
        .card-2 {
            top: 18%;
            left: 43%;
            width: 20%;
            transform: rotate(1deg);
            z-index: 2;
        }

        /* 绿色app设计 */
        .card-3 {
            top: 40%;
            left: 30%;
            width: 23%;
            transform: rotate(-10deg);
            z-index: 4;
        }

        /* 火锅排档app */
        .card-4 {
            top: 35%;
            left: 58%;
            width: 9%;
            transform: rotate(-3deg);
            z-index: 5;
        }

        /* 紫色抽卡游戏 */
        .card-5 {
            top: 47%;
            left: 65%;
            width: 20%;
            transform: rotate(4deg);
            z-index: 3;
        }

        /* newjeans app */
        .card-6 {
            top: 43%;
            left: 50%;
            width: 9%;
            transform: rotate(-19deg);
            z-index: 7;
        }

        /* newjeans 图标 */
        .card-7 {
            top: 70%;
            left: 40%;
            width: 20%;
            transform: rotate(0deg);
            z-index: 8;
        }

        /* njs */
        .card-8 {
            top: 50%;
            left: 84%;
            width: 9%;
            transform: rotate(15deg);
            z-index: 6;
        }

        @media (max-width: 1024px) {
            .logo {
                top: 2%;
                left: 2%;
                width: 30%;
            }

            .nav {
                top: 2%;
                right: 2%;
                gap: 20px;
            }

            .lang-switch {
                font-size: 12px;
            }

            .nav-links {
                font-size: 24px;
            }

            .categories {
                top: 25%;
                left: 2%;
            }

            .category-item {
                font-size: 28px;
                margin-bottom: 20px;
            }

            .work-cards {
                padding-left: 30%;
            }

            .card-1, .card-2, .card-3, .card-4,
            .card-5, .card-6, .card-7, .card-8 {
                transform: none !important;
                box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.1);
            }
        }

        @media (max-width: 768px) {
            .hero {
                padding: 10px;
            }

            .logo {
                top: 1%;
                width: 40%;
            }

            .nav {
                gap: 10px;
            }

            .nav-links {
                font-size: 18px;
            }

            .categories {
                position: static;
                margin-top: 120px;
                padding: 20px;
            }

            .category-item {
                font-size: 24px;
            }

            .work-cards {
                position: static;
                min-height: auto;
                padding: 20px;
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
            }

            .card {
                position: static !important;
                width: 100% !important;
                height: 150px !important;
                transform: none !important;
            }
        }

        @media (max-width: 480px) {
            .work-cards {
                grid-template-columns: 1fr;
            }
        }

        /* 入场动画 - 卡片从大变小 */
        /* 默认卡片可见，直接访问时JS会先隐藏再触发动画 */

        .card.animate-in {
            animation: cardShrink 0.8s ease-out forwards;
        }

        /* 每个卡片保留原有的 rotate，只改变 scale */
        .card-1.animate-in { animation: cardShrink1 0.8s ease-out forwards; animation-delay: 0.1s; }
        .card-2.animate-in { animation: cardShrink2 0.8s ease-out forwards; animation-delay: 0.15s; }
        .card-3.animate-in { animation: cardShrink3 0.8s ease-out forwards; animation-delay: 0.2s; }
        .card-4.animate-in { animation: cardShrink4 0.8s ease-out forwards; animation-delay: 0.25s; }
        .card-5.animate-in { animation: cardShrink5 0.8s ease-out forwards; animation-delay: 0.3s; }
        .card-6.animate-in { animation: cardShrink6 0.8s ease-out forwards; animation-delay: 0.35s; }
        .card-7.animate-in { animation: cardShrink7 0.8s ease-out forwards; animation-delay: 0.4s; }
        .card-8.animate-in { animation: cardShrink8 0.8s ease-out forwards; animation-delay: 0.45s; }

        @keyframes cardShrink1 {
            0% { opacity: 0; transform: scale(2) rotate(3deg); }
            50% { opacity: 0.5; }
            100% { opacity: 1; transform: scale(1) rotate(3deg); }
        }
        @keyframes cardShrink2 {
            0% { opacity: 0; transform: scale(2) rotate(-4deg); }
            50% { opacity: 0.5; }
            100% { opacity: 1; transform: scale(1) rotate(-4deg); }
        }
        @keyframes cardShrink3 {
            0% { opacity: 0; transform: scale(2) rotate(-2deg); }
            50% { opacity: 0.5; }
            100% { opacity: 1; transform: scale(1) rotate(-2deg); }
        }
        @keyframes cardShrink4 {
            0% { opacity: 0; transform: scale(2) rotate(3deg); }
            50% { opacity: 0.5; }
            100% { opacity: 1; transform: scale(1) rotate(3deg); }
        }
        @keyframes cardShrink5 {
            0% { opacity: 0; transform: scale(2) rotate(2deg); }
            50% { opacity: 0.5; }
            100% { opacity: 1; transform: scale(1) rotate(2deg); }
        }
        @keyframes cardShrink6 {
            0% { opacity: 0; transform: scale(2) rotate(-5deg); }
            50% { opacity: 0.5; }
            100% { opacity: 1; transform: scale(1) rotate(-5deg); }
        }
        @keyframes cardShrink7 {
            0% { opacity: 0; transform: scale(2) rotate(1deg); }
            50% { opacity: 0.5; }
            100% { opacity: 1; transform: scale(1) rotate(1deg); }
        }
        @keyframes cardShrink8 {
            0% { opacity: 0; transform: scale(2) rotate(-3deg); }
            50% { opacity: 0.5; }
            100% { opacity: 1; transform: scale(1) rotate(-3deg); }
        }

        /* 背景渐变过渡 */
        .hero {
            animation: fadeInBg 1s ease-out;
        }

        @keyframes fadeInBg {
            0% {
                opacity: 0;
            }
            100% {
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="hero">
        <div class="logo" onclick="goToIndex()" style="cursor: pointer;">
            <img src="./assets/logo-wendy.svg" alt="Wendy" />
        </div>

        <nav class="nav">
            <button class="lang-switch">EN/中文</button>
            <a href="#works" class="nav-links">Works</a>
            <a href="#about" class="nav-links">About</a>
            <a href="#contact" class="nav-links">Contact</a>
        </nav>

        <div class="categories">
            <a href="app-showcase.html" class="category-item">1.Apps</a>
            <a href="websites.html" class="category-item">2.Websites</a>
            <a href="games.html" class="category-item">3.Game</a>
            <a href="icons.html" class="category-item">4.Icons</a>
        </div>

        <div class="work-cards">
            <div class="card card-1" onclick="location.href='app-showcase.html'">
                <img src="./assets/work-card-1.png" alt="App作品2" />
            </div>
            <div class="card card-2" onclick="location.href='app-showcase.html'">
                <img src="./assets/work-card-2-2cc0ae.png" alt="作品2" />
            </div>
            <div class="card card-3" onclick="location.href='app-showcase.html'">
                <img src="./assets/work-card-5.png" alt="作品3" />
            </div>
            <div class="card card-4" onclick="location.href='app-showcase.html'">
                <img src="./assets/work-card-4.png" alt="作品4" />
            </div>
            <div class="card card-5" onclick="location.href='app-showcase.html'">
                <img src="./assets/work-card-3-60e672.png" alt="作品5" />
            </div>
            <div class="card card-6" onclick="location.href='app-showcase.html'">
                <img src="./assets/work-card-6.png" alt="作品6" />
            </div>
            <div class="card card-7" onclick="location.href='app-showcase.html'">
                <img src="./assets/work-card-7.png" alt="作品7" />
            </div>
            <div class="card card-8" onclick="location.href='app-showcase.html'">
                <img src="./assets/work-card-8.png" alt="作品8" />
            </div>
        </div>
    </div>

    <script>
        // 页面加载时触发卡片入场动画
        window.addEventListener('load', () => {
            const cards = document.querySelectorAll('.card');
            
            // 检测是否从 index.html 过渡过来
            const urlParams = new URLSearchParams(window.location.search);
            const fromIndex = urlParams.get('from') === 'index';
            
            // 如果从 index 过来，直接显示，不触发入场动画
            if (fromIndex) {
                cards.forEach(card => {
                    card.style.opacity = '1';
                    card.style.transform = ''; // 使用 CSS 中定义的 transform
                });
            } else {
                // 直接访问 works.html 时触发入场动画
                setTimeout(() => {
                    cards.forEach(card => {
                        card.classList.add('animate-in');
                    });
                }, 200);
            }
        });

        // 点击 Wendy logo 返回首页
        function goToIndex() {
            // 添加过渡动画
            document.body.style.transition = 'opacity 0.5s ease';
            document.body.style.opacity = '0';
            
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 500);
        }
    </script>
</body>
</html>
